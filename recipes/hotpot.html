<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotpot</title>
</head>

<body>
    <h1>涮羊肉</h1>
    <img
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/37/Instant-boiled_mutton_hot_pot_at_Yangfang_Shengli_%2820200111153612%29.jpg/1024px-Instant-boiled_mutton_hot_pot_at_Yangfang_Shengli_%2820200111153612%29.jpg">
    <h2>文化</h2>
    <p>据传元世祖忽必烈南下时突然思念家乡的羊肉，因而叫厨师去煮，但敌人忽至，刚杀好羊而来不及下锅，于是厨师把羊肉切成薄片，放到滚水中涮，忽必烈吃完后便急忙迎战。打完战回营后，忽必烈叫军厨再做一次，忽必烈和将领们吃后赞不绝口，于是赐名“涮羊肉”。
    </p>
    <p>清代时期，康熙、乾隆二帝所举办的几次规模宏大的“千叟宴”中就有羊肉火锅，后流传至市肆。</p>
    <h2>食材</h2>
    <ul>
        <li>羊肉</li>
        <li>大白菜</li>
        <li>豆腐</li>
        <li>粉丝</li>
        <li>烧饼</li>
        <li>芝麻酱</li>
        <li>肚子</li>
    </ul>
    <h2>步骤</h2>
    <ol>
        <li>涮肉</li>
        <li>涮肚子</li>
        <li>放白菜、豆腐和粉丝</li>
        <li>最后是喝汤</li>
    </ol>
</body>

</html>
